<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Visual Programming</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar">
        <div class="nav-left">
            <div class="menu-wrapper">
                <button id="btn-menu" title="Menu">&#9776; Menu</button>
                <div id="main-menu" class="dropdown-menu" style="display:none;">
                    <div class="menu-item" id="menu-new">New Project</div>
                    <div class="menu-item" id="menu-save">Save Project</div>
                    <div class="menu-item" id="menu-load">My Projects</div>
                    <div class="menu-sep"></div>
                    <div class="menu-item" id="menu-login">Login</div>
                    <div class="menu-item" id="menu-register">Register</div>
                    <div class="menu-item" id="menu-logout" style="display:none;">Logout</div>
                    <div class="menu-sep"></div>
                    <div class="menu-item" id="menu-settings">Settings</div>
                </div>
            </div>
            <span class="logo">Python VP</span>
            <input type="text" id="project-name" placeholder="Untitled Project" value="Untitled Project">
        </div>
        <div class="nav-center">
            <select id="theme-select" title="Color Theme">
                <option value="catppuccin">Catppuccin</option>
                <option value="ocean">Ocean</option>
                <option value="forest">Forest</option>
                <option value="sunset">Sunset</option>
                <option value="light">Light</option>
            </select>
        </div>
        <div class="nav-right">
            <span id="username-display"></span>
        </div>
    </nav>
    <!-- Editor Area -->
    <div id="editor-area">
        <div id="blockly-container">
            <div id="blockly-toolbar">
                <input type="text" id="block-search" placeholder="Search blocks..." autocomplete="off">
                <button id="btn-cleanup" title="Clean up blocks">Clean Up</button>
            </div>
            <div id="blockly-div"></div>
            <button id="btn-toggle-controls" title="Toggle controls">...</button>
        </div>
        <button id="btn-toggle-code" title="Toggle code panel">&rsaquo;</button>
        <div id="code-panel">
            <div class="panel-header">Python Code</div>
            <pre><code id="code-preview" class="language-python"></code></pre>
        </div>
    </div>

    <!-- Console -->
    <div id="console-area">
        <div class="console-toolbar">
            <span class="console-title">Console</span>
            <button id="btn-run">Run</button>
            <button id="btn-stop" disabled>Stop</button>
            <button id="btn-clear">Clear</button>
            <span id="pyodide-status">Loading Python...</span>
        </div>
        <div id="console-output"></div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="auth-modal-title">Login</h2>
            <form id="auth-form">
                <input type="text" id="auth-username" placeholder="Username" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <p id="auth-error" class="error"></p>
                <button type="submit" id="auth-submit">Login</button>
            </form>
        </div>
    </div>

    <!-- Projects Modal -->
    <div id="projects-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>My Projects</h2>
            <div id="projects-list"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Settings</h2>
            <div class="setting-row">
                <label for="setting-flyout-autohide">Auto-hide blocks panel on drag</label>
                <input type="checkbox" id="setting-flyout-autohide">
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <!-- Block definitions -->
    <script src="{{ url_for('static', filename='js/blocks/imports.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/events.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/variables.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/statements.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/text.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/math_blocks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/logic.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/lists.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/loops.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/definitions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/classes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/turtle_blocks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/graphs.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/random_blocks.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blocks/processing.js') }}"></script>
    <!-- App scripts -->
    <script src="{{ url_for('static', filename='js/toolbox.js') }}"></script>
    <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/runner.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/projects.js') }}"></script>
    <script src="{{ url_for('static', filename='js/search.js') }}"></script>
    <script src="{{ url_for('static', filename='js/themes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
