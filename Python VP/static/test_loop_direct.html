<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>
</head>
<body>
    <h1>Direct Loop Test</h1>
    <button onclick="testLoop()">Test Loop Block</button>
    <pre id="output"></pre>

    <script>
        // Define loop block
        Blockly.common.defineBlocksWithJsonArray([{
            "type": "loop_for_range",
            "message0": "for %1 in range( %2 , %3 ):",
            "args0": [
                {"type": "field_variable", "name": "VAR", "variable": "i"},
                {"type": "input_value", "name": "START"},
                {"type": "input_value", "name": "END"}
            ],
            "message1": "%1",
            "args1": [{"type": "input_statement", "name": "DO"}],
            "previousStatement": null,
            "nextStatement": null,
            "colour": 120
        }]);

        // Define generator
        python.pythonGenerator.forBlock['loop_for_range'] = function(block, generator) {
            var variable = generator.getVariableName(block.getFieldValue('VAR'));
            var start = generator.valueToCode(block, 'START', generator.ORDER_NONE) || '0';
            var end = generator.valueToCode(block, 'END', generator.ORDER_NONE) || '10';
            var body = generator.statementToCode(block, 'DO') || generator.INDENT + 'pass\n';
            return 'for ' + variable + ' in range(' + start + ', ' + end + '):\n' + body;
        };

        function testLoop() {
            const workspace = Blockly.inject('blocklyDiv', {});
            const block = workspace.newBlock('loop_for_range');
            block.initSvg();
            block.render();

            const code = python.pythonGenerator.blockToCode(block);
            document.getElementById('output').textContent =
                'Block type: ' + block.type + '\n' +
                'Code type: ' + typeof code + '\n' +
                'Code value: ' + JSON.stringify(code) + '\n' +
                'Code:\n' + code;
        }
    </script>
    <div id="blocklyDiv" style="height: 1px; width: 1px;"></div>
</body>
</html>
